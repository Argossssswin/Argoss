name: Mirror Repository

on:
  schedule:
    # Проверка каждый день в 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror repository
        run: |
          git clone --mirror https://github.com/thoresensandmann432-source/argoss.git
          cd argoss.git
          git push --mirror https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Argossssswin/Argoss.git
          cd ..
          rm -rf argoss.git
